function AuthScreen({onDemoLogin}){

  const send=async()=>{
    const t=email.toLowerCase().trim();

    if(!valid(t)){setErr(`Only ${ALLOWED_DOMAIN} or ${ALLOWED_DOMAIN2} emails allowed.`);setStatus("error");return;}
    setStatus("loading");setErr("");
    if(DEMO_MODE){setTimeout(()=>onDemoLogin(t),1000);return;}
    try{const{error}=await sb.auth.signInWithOtp({email:t,options:{emailRedirectTo:window.location.href}});if(error)throw error;setStatus("sent");}
    catch(e){setErr(e.message||"Something went wrong.");setStatus("error");}
  };

    <div style={{minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",backgroundColor:T.page,overflow:"hidden"}}>

          <div className="fade-up" style={{width:"100%",background:T.card,borderRadius:20,border:`1px solid ${T.border}`,padding:28,boxShadow:"0 4px 24px rgba(128,0,0,0.1)"}}>

            </div>}
            <h2 style={{fontSize:18,fontWeight:900,color:T.textMain,marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Student Login</h2>

            <div style={{position:"relative",marginBottom:err?8:16}}>
              <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Mail c={T.textDim} s={16}/></div>

/* ══════════ CHAT VIEW — WhatsApp-style full screen ══════════ */
function ChatView({convo,userEmail,user,onBack,onReport,onRevealUpdate}){
  const [msgs,setMsgs]             = useState([]);
  const [input,setInput]           = useState("");
  const [showMenu,setShowMenu]     = useState(false);
  const [reportDone,setReportDone] = useState(false);
  const [revealed,setRevealed]     = useState(convo.revealed||false);
  const [revealSent,setRevealSent] = useState(false);
  const [revealIncoming,setRevealIncoming] = useState(false);
  const endRef   = useRef(null);
  const inputRef = useRef(null);
  const isMarket = convo.type==="marketplace";
  const peerEmail= convo.with||"";
  const peerName = peerEmail?peerEmail.split("@")[0]:"Someone";

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  useEffect(()=>{
    if(!convo?.id)return;
    const poll=async()=>{
      const{data:mdata}=await sb.from("messages").select("*").eq("conversation_id",convo.id).order("created_at",{ascending:true});
      if(mdata){
        const revReq=mdata.find(m=>m.is_system&&m.text==="__REVEAL_REQUEST__"&&m.sender_id!==user?.id);
        if(revReq&&!revealed)setRevealIncoming(true);
        setMsgs(mdata.filter(m=>m.text!=="__REVEAL_REQUEST__").map(m=>({id:m.id,from:m.sender_id===user?.id?userEmail:peerEmail,text:m.text,ts:new Date(m.created_at),system:m.is_system||false})));
      }
      const{data:cv}=await sb.from("conversations").select("identity_revealed").eq("id",convo.id).single();
      if(cv?.identity_revealed&&!revealed){setRevealed(true);onRevealUpdate&&onRevealUpdate(convo.id);}
    };
    poll();
    const timer=setInterval(poll,3000);
    return()=>clearInterval(timer);
  },[convo?.id]);

  const send=async()=>{
    if(!input.trim())return;
    const txt=input.trim();setInput("");inputRef.current?.focus();
    await sb.from("messages").insert({conversation_id:convo.id,sender_id:user?.id,text:txt,is_system:false});
  };

  const sendRevealRequest=async()=>{
    setRevealSent(true);
    await sb.from("messages").insert({conversation_id:convo.id,sender_id:user?.id,text:"__REVEAL_REQUEST__",is_system:true});
    await sb.from("messages").insert({conversation_id:convo.id,sender_id:user?.id,text:"You sent a reveal request. Waiting for their response...",is_system:true});
  };

  const acceptReveal=async()=>{
    setRevealIncoming(false);setRevealed(true);
    await sb.from("conversations").update({identity_revealed:true}).eq("id",convo.id);
    await sb.from("messages").insert({conversation_id:convo.id,sender_id:user?.id,text:"Identities revealed! You are now chatting with "+peerName+" ("+peerEmail+")",is_system:true});
    onRevealUpdate&&onRevealUpdate(convo.id);
  };

  const declineReveal=async()=>{
    setRevealIncoming(false);
    await sb.from("messages").insert({conversation_id:convo.id,sender_id:user?.id,text:"Reveal declined. Staying anonymous.",is_system:true});
    await sb.from("messages").delete().eq("conversation_id",convo.id).eq("text","__REVEAL_REQUEST__");
  };

  const handleReport=()=>{setShowMenu(false);setReportDone(true);onReport&&onReport(convo.id);setTimeout(()=>setReportDone(false),3000);};

  return(
    <div style={{position:"fixed",inset:0,zIndex:100,maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",background:"#fdf5f5"}} className="slide-in">

      <div style={{background:T.maroon,boxShadow:"0 2px 12px rgba(128,0,0,0.3)",zIndex:10}}>
        <div style={{height:1,background:"linear-gradient(to right,transparent,rgba(255,220,150,0.5),transparent)"}}/>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px 12px"}}>
          <button onClick={onBack} style={{background:"none",border:"none",display:"flex",cursor:"pointer",padding:4,marginLeft:-4}}><Back c="white" s={22}/></button>
          {avatar(isMarket||revealed?peerEmail:"ghost@bbdu.ac.in",40)}
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontWeight:900,color:"white",fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isMarket?peerName:(revealed?peerName:"Anonymous")}</p>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.75)",marginTop:1}}>{isMarket?`re: ${convo.item}`:(revealed?peerEmail:"Identity hidden")}</p>
          </div>
          <button onClick={()=>setShowMenu(m=>!m)} style={{background:"none",border:"none",cursor:"pointer",padding:6,color:"white",position:"relative"}}>
            <Ellipsis c="white" s={22}/>
            {showMenu&&(
              <div style={{position:"absolute",top:"100%",right:0,background:T.card,border:`1px solid ${T.border}`,borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",padding:"6px 0",minWidth:160,zIndex:20}} className="pop-in">
                <button onClick={handleReport} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:"#dc2626"}} onMouseEnter={e=>e.currentTarget.style.background="#fef2f2"} onMouseLeave={e=>e.currentTarget.style.background="none"}><Flag c="#dc2626" s={14}/>Report User</button>
                <button onClick={()=>setShowMenu(false)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:T.textSub}} onMouseEnter={e=>e.currentTarget.style.background=T.subtle} onMouseLeave={e=>e.currentTarget.style.background="none"}><Xx c={T.textSub} s={14}/>Close</button>
              </div>
            )}
          </button>
        </div>
      </div>

      {isMarket&&(
        <div style={{background:"#fdf0f0",borderBottom:`1px solid ${T.border}`,padding:"8px 16px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:T.subtle,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Bag c={T.maroon} s={14}/></div>
          <div><p style={{fontSize:12,fontWeight:700,color:T.textMain}}>{convo.item}</p><p style={{fontSize:12,color:T.maroon,fontWeight:900}}>Rs.{convo.itemPrice}</p></div>
        </div>
      )}

      {!isMarket&&!revealed&&(
        <div style={{background:"#fffbeb",borderBottom:"1px solid #fde68a",padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}>
          <Ghost c="#d97706" s={16}/>
          <p style={{flex:1,fontSize:12,color:"#92400e",lineHeight:1.4}}><strong>Anonymous chat.</strong> Both must agree to reveal identity.</p>
          {!revealSent?(<button onClick={sendRevealRequest} style={{flexShrink:0,padding:"6px 12px",borderRadius:999,background:"#fef3c7",border:"1px solid #fde68a",color:"#92400e",fontSize:11,fontWeight:700,cursor:"pointer"}}>Reveal</button>):(<span style={{fontSize:11,color:"#92400e",fontWeight:700}}>Pending...</span>)}
        </div>
      )}

      {revealIncoming&&!revealed&&(
        <div style={{background:"#fef3c7",borderBottom:"2px solid #f59e0b",padding:"12px 16px"}}>
          <p style={{fontSize:13,fontWeight:800,color:"#92400e",marginBottom:8}}>They want to reveal identities!</p>
          <div style={{display:"flex",gap:8}}>
            <button onClick={acceptReveal} style={{flex:1,padding:"9px",borderRadius:10,background:T.maroon,border:"none",color:"white",fontSize:13,fontWeight:700,cursor:"pointer"}}>Reveal</button>
            <button onClick={declineReveal} style={{flex:1,padding:"9px",borderRadius:10,background:"#f3f4f6",border:"none",color:T.textSub,fontSize:13,fontWeight:700,cursor:"pointer"}}>Don't Reveal</button>
          </div>
        </div>
      )}

      {reportDone&&(<div style={{background:"#1a0000",color:"white",padding:"10px 16px",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:8}}><Check c="#4ade80" s={14}/>Reported. Our team will review this.</div>)}

      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:8,background:"#f8eeee"}} onClick={()=>setShowMenu(false)}>
        {msgs.map((m,i)=>{
          const isMe=m.from===userEmail;
          const isSystem=m.system||m.from==="system";
          if(isSystem)return(<div key={m.id||i} style={{display:"flex",justifyContent:"center",margin:"4px 0"}}><span className="bubble-system">{m.text}</span></div>);
          return(
            <div key={m.id||i} style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",alignItems:"flex-end",gap:8}} className="fade-up">
              {!isMe&&<div style={{flexShrink:0,marginBottom:2}}>{avatar(revealed?m.from:"ghost@bbdu.ac.in",28)}</div>}
              <div>
                <div className={isMe?"bubble-me":"bubble-them"}>{m.text}</div>
                <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3,justifyContent:isMe?"flex-end":"flex-start"}}>
                  <span style={{fontSize:10,color:T.textDim}}>{fmtTime(m.ts)}</span>
                  {isMe&&<DoubleCheck c="#b06060" s={12}/>}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>

      <div style={{background:T.card,borderTop:`1px solid ${T.border}`,padding:"10px 12px",display:"flex",gap:8,alignItems:"flex-end",boxShadow:"0 -2px 12px rgba(128,0,0,0.06)"}}>
        <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Type a message..." rows={1} dir="ltr"
          style={{flex:1,background:T.subtle,border:`1.5px solid ${T.border}`,borderRadius:22,padding:"10px 16px",fontSize:14,color:T.textMain,outline:"none",resize:"none",lineHeight:1.4,maxHeight:100,overflowY:"auto"}}
          onFocus={e=>e.target.style.borderColor=T.maroon} onBlur={e=>e.target.style.borderColor=T.border}/>
        <button onClick={send} disabled={!input.trim()} style={{width:44,height:44,borderRadius:"50%",background:input.trim()?T.maroon:"#e8c0c0",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:input.trim()?"pointer":"default",transition:"all 0.2s",flexShrink:0}}>
          <Send c="white" s={16}/>
        </button>
      </div>
    </div>
  );
}

const ModalShell=({onClose,children,tall=false})=>(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><div style={{position:"absolute",inset:0,background:"rgba(26,0,0,0.45)",backdropFilter:"blur(4px)"}} onClick={onClose}/><div className="slide-up" style={{position:"relative",width:"100%",maxWidth:430,background:"#fff",border:"1px solid #e8c0c0",borderBottom:"none",borderRadius:"24px 24px 0 0",padding:24,boxShadow:"0 -8px 40px rgba(128,0,0,0.15)",maxHeight:tall?"90vh":"auto",overflowY:"auto"}}><div style={{width:40,height:4,borderRadius:2,background:"#e8c0c0",margin:"0 auto 20px"}}/>{children}</div></div>);

function MainApp({user,onSignOut}){
  const [nav,setNav]             = useState("feed");
  const [tab,setTab]             = useState("confessions");
  const [sort,setSort]           = useState("hot");
  const [cat,setCat]             = useState("all");
  const [q,setQ]                 = useState("");
  const [votes,setVotes]         = useState({});
  const [liked,setLiked]         = useState({});
  const [rep,setRep]             = useState({});
  const [saved,setSaved]         = useState({});
  const [toast,setToast]         = useState(null);
  const [confModal,setConfModal] = useState(false);
  const [draft,setDraft]         = useState("");
  const [confs,setConfs]         = useState([]);
  const [loadingPosts,setLoadingPosts] = useState(true);
  const [sellModal,setSellModal] = useState(false);
  const [sell,setSell]           = useState({title:"",price:"",category:"book",condition:"Good",desc:""});
  const [listings,setListings]   = useState([]);
  const [loadingListings,setLoadingListings] = useState(true);
  const [signOutDlg,setSignOutDlg] = useState(false);
  const [profilePage,setProfilePage] = useState(null);

  // Messaging state
  const [convos,setConvos]       = useState([]);
  const [openChat,setOpenChat] = useState(null);   // convo object currently open
  const [connectReqs,setConnectReqs] = useState({});
  const [pendingReqs,setPendingReqs]   = useState([]);
  const [commentsPost,setCommentsPost] = useState(null);
  const [commentDraft,setCommentDraft] = useState(""); // confId -> "pending"|"accepted"

  const userEmail = user?.email||"";
  const username  = userEmail.split("@")[0];
  const totalUnread = convos.reduce((s,c)=>s+(c.unread||0),0);

  const showToast=(msg,color="#16a34a")=>{setToast({msg,color});setTimeout(()=>setToast(null),3000);};

  const vote=async(postId,direction)=>{
    const current=votes[postId];
    if(current===direction){
      await sb.from('votes').delete().eq('post_id',postId).eq('user_id',user?.id);
      setVotes(v=>{const n={...v};delete n[postId];return n;});
    } else {
      await sb.from('votes').upsert({post_id:postId,user_id:user?.id,type:direction},{onConflict:'post_id,user_id'});
      setVotes(v=>({...v,[postId]:direction}));
    }
    const post=confs.find(c=>c.id===postId);
    if(post){
      const upD=direction==='up'?(current==='up'?-1:1):(current==='up'?-1:0);
      const downD=direction==='down'?(current==='down'?-1:1):(current==='down'?-1:0);
      await sb.from('posts').update({upvotes:post.upvotes+upD,downvotes:post.downvotes+downD}).eq('id',postId);
      setConfs(cs=>cs.map(c=>c.id===postId?{...c,upvotes:c.upvotes+upD,downvotes:c.downvotes+downD}:c));
    }
  };
  const gv  =c=>({up:c.upvotes+(votes[c.id]==="up"?1:0),down:c.downvotes+(votes[c.id]==="down"?1:0)});
  const report=async(id)=>{if(rep[id])return;setRep(r=>({...r,[id]:true}));await sb.from('reports').insert({reporter_id:user?.id,target_id:String(id),reason:'confession'});showToast('Reported! We will review it.');};
  const toggleSave=async(postId)=>{
    if(saved[postId]){
      await sb.from('saved_posts').delete().eq('user_id',user?.id).eq('post_id',postId);
      setSaved(s=>{const n={...s};delete n[postId];return n;});
      showToast("Removed from saved.");
    } else {
      await sb.from('saved_posts').insert({user_id:user?.id,post_id:postId});
      setSaved(s=>({...s,[postId]:true}));
      showToast("Post saved ✓");
    }
  };

  const fetchPosts=async()=>{setLoadingPosts(true);const{data,error}=await sb.from('posts').select('*').order('time',{ascending:false});if(!error&&data)setConfs(data.map(p=>({id:p.id,text:p.text,upvotes:p.upvotes||0,downvotes:p.downvotes||0,hot:p.is_hot||false,comments:p.comment_count||0,mine:p.author_id===user?.id,author_id:p.author_id,authorEmail:p.author_email||'anonymous',time:(()=>{const d=(Date.now()-new Date(p.time))/1000;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';})()})));setLoadingPosts(false);};

                            <p style={{fontSize:12,color:T.textSub,marginTop:2,lineHeight:1.5}}>{l.desc}</p>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <p style={{fontSize:16,fontWeight:900,color:T.maroon}}>₹{l.price}</p>
                            <button onClick={()=>setLiked(lk=>({...lk,[l.id]:!lk[l.id]}))} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,border:"none",background:"none",cursor:"pointer",color:liked[l.id]?"#dc2626":T.textDim,marginTop:2,marginLeft:"auto"}}>
                              <Hrt c={liked[l.id]?"#dc2626":T.textDim} fill={liked[l.id]?"#dc2626":"none"}/>{l.likes+(liked[l.id]?1:0)}
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12,paddingTop:12,borderTop:`1px solid ${T.border}`}}>
                      <div style={{display:"flex",gap:6}}>
                        <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:700,background:cc.bg,color:cc.color,border:`1px solid ${cc.border}`}}>{catIco(l.category)}{catLbl(l.category)}</span>
                        <span style={{fontSize:11,color:T.textSub,background:"#fdf0f0",border:`1px solid ${T.border}`,padding:"2px 8px",borderRadius:999}}>{l.condition}</span>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <button onClick={()=>report(l.id)} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,padding:"4px 8px",borderRadius:999,cursor:rep[l.id]?"default":"pointer",background:rep[l.id]?"#fef9c3":"transparent",color:rep[l.id]?"#92400e":T.textDim,border:rep[l.id]?"1px solid #fde68a":"1px solid transparent"}}>
                          <Flag c={rep[l.id]?"#92400e":T.textDim} s={10}/>{rep[l.id]?"Reported":"Report"}
                        </button>
                        {/* ✅ MESSAGE SELLER button — hide on own listings */}
                        {!l.mine&&<button onClick={()=>openMarketChat(l)}
                          style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:999,background:T.maroon,color:"white",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",boxShadow:"0 2px 10px rgba(128,0,0,0.3)"}}>
                          <ChatNav c="white" s={13}/>Message Seller
                        </button>}
                      </div>
                    </div>
                  </div>
                );
              })}
              {filteredListings.length===0&&<Empty icon={<Bag c={T.textDim} s={40}/>} msg="No listings found"/>}
            </div>
          </div>}
        </>}

        {/* ── MESSAGES TAB ── */}
        {nav==="messages"&&(
          <MessagesScreen convos={convos} userEmail={userEmail} onOpen={c=>{setOpenChat({...c,unread:0});setConvos(cs=>cs.map(cv=>cv.id===c.id?{...cv,unread:0}:cv));}} totalUnread={totalUnread} pendingReqs={pendingReqs} onAccept={acceptRequest} onDecline={declineRequest}/>
        )}

        {/* ── PROFILE ── */}
        {nav==="profile"&&<>
          {!profilePage&&<div style={{padding:"32px 16px 24px"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:28}}>
              <div style={{width:80,height:80,borderRadius:"50%",background:T.maroon,border:"3px solid #f5c0c0",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(128,0,0,0.25)",marginBottom:12}}><User c="white" s={36}/></div>
              <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:18,fontWeight:900,color:T.textMain}}>{username}</h2>
              <p style={{fontSize:12,color:T.textSub,marginTop:3}}>{userEmail}</p>
              <div style={{display:"flex",gap:24,marginTop:16}}>
                {[[myConfs.length,"Posts"],[48,"Upvotes"],[myListings.length,"Listings"]].map(([n,l])=>(
                  <div key={l} style={{textAlign:"center"}}>
                    <p style={{fontSize:18,fontWeight:900,color:T.maroon}}>{n}</p>
                    <p style={{fontSize:11,color:T.textSub}}>{l}</p>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(128,0,0,0.07)",marginBottom:16}}>
              {[
                {key:"myConfs",lbl:"My Confessions",badge:myConfs.length,icon:<Ghost c={T.textDim} s={16}/>},
                {key:"myListings",lbl:"My Listings",badge:myListings.length,icon:<Bag c={T.textDim} s={16}/>},
                {key:"saved",lbl:"Saved Posts",badge:Object.keys(saved).length,icon:<Hrt c={T.textDim} s={16}/>},
                {key:"reportHistory",lbl:"Report History",badge:reportedIds.length,icon:<Flag c={T.textDim} s={16}/>},
              ].map(({key,lbl,badge,icon},i,arr)=>(
                <button key={key} onClick={()=>setProfilePage(key)}
                  style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:"transparent",border:"none",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none",cursor:"pointer",textAlign:"left",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#fdf0f0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>{icon}<span style={{fontSize:14,fontWeight:700,color:T.textMain}}>{lbl}</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {badge>0&&<span style={{background:"#fdf0f0",color:T.maroon,border:`1px solid ${T.border}`,borderRadius:999,fontSize:11,fontWeight:900,padding:"2px 8px"}}>{badge}</span>}
                    <Chev c={T.textDim}/>
                  </div>
                </button>
              ))}
            </div>
            <button onClick={()=>setSignOutDlg(true)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",borderRadius:12,background:"#fdf0f0",border:`1px solid ${T.border}`,color:T.maroon,fontSize:14,fontWeight:700,cursor:"pointer"}}
              onMouseEnter={e=>{e.currentTarget.style.background="#f5d5d5";e.currentTarget.style.borderColor=T.maroon;}}
              onMouseLeave={e=>{e.currentTarget.style.background="#fdf0f0";e.currentTarget.style.borderColor=T.border;}}>
              <LogOut c={T.maroon} s={16}/>Sign Out
            </button>
          </div>}
          {profilePage==="myConfs"&&(
            <SubPage title="My Confessions" icon={<Ghost c={T.maroon} s={18}/>}>
              {myConfs.length===0?<Empty icon={<Ghost c={T.textDim} s={40}/>} msg="No confessions posted yet."/>:
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {myConfs.map(c=>(
                    <div key={c.id} className="card">
                      <p style={{fontSize:14,color:T.textMain,lineHeight:1.6,fontFamily:"Georgia,serif",marginBottom:10}}>{c.text}</p>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <span style={{fontSize:12,color:T.textDim}}>{c.time} · ↑ {c.upvotes} · 💬 {c.comments}</span>
                        <button onClick={()=>{(async()=>{await sb.from("posts").delete().eq("id",c.id);setConfs(cs=>cs.filter(x=>x.id!==c.id));showToast("Confession deleted.");})();}} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:999,background:"#fef2f2",border:"1px solid #fecaca",color:"#dc2626",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                          <Trash c="#dc2626" s={12}/>Delete
                        </button>
                      </div>
                    </div>
                  ))}
                </div>}
            </SubPage>
          )}
          {profilePage==="myListings"&&(
            <SubPage title="My Listings" icon={<Bag c={T.maroon} s={18}/>}>
              {myListings.length===0?<Empty icon={<Bag c={T.textDim} s={40}/>} msg="No listings yet."/>:
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {myListings.map(l=>{const cc=CC[l.category]||CC.other;return(
                    <div key={l.id} className="card">
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <div><p style={{fontWeight:700,color:T.textMain,fontSize:14}}>{l.title}</p><p style={{fontSize:12,color:T.textSub,marginTop:2}}>{l.desc}</p></div>
                        <p style={{fontSize:16,fontWeight:900,color:T.maroon,flexShrink:0,marginLeft:12}}>₹{l.price}</p>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",gap:6}}>
                          <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:700,background:cc.bg,color:cc.color,border:`1px solid ${cc.border}`}}>{catIco(l.category)}{catLbl(l.category)}</span>
                          <span style={{fontSize:11,color:T.textSub,background:"#fdf0f0",border:`1px solid ${T.border}`,padding:"2px 8px",borderRadius:999}}>{l.condition}</span>
                        </div>
                        <button onClick={()=>{(async()=>{await sb.from("listings").delete().eq("id",l.id);setListings(ls=>ls.filter(x=>x.id!==l.id));showToast("Listing deleted.");})();}} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:999,background:"#fef2f2",border:"1px solid #fecaca",color:"#dc2626",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                          <Trash c="#dc2626" s={12}/>Delete
                        </button>
                      </div>
                    </div>
                  );})}
                </div>}
            </SubPage>
          )}
          {profilePage==="saved"&&(
            <SubPage title="Saved Posts" icon={<Hrt c={T.maroon} s={18}/>}>
              {savedConfs.length===0?<Empty icon={<Hrt c={T.textDim} s={40}/>} msg="No saved posts yet. Tap ♥ to save."/>:
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {savedConfs.map(c=>(
                    <div key={c.id} className="card">
                      <p style={{fontSize:14,color:T.textMain,lineHeight:1.6,fontFamily:"Georgia,serif",marginBottom:10}}>{c.text}</p>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:12,color:T.textDim}}>{c.time} · ↑ {c.upvotes}</span>
                        <button onClick={()=>toggleSave(c.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:999,background:"#fdf0f0",border:`1px solid ${T.border}`,color:T.maroon,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                          <Xx c={T.maroon} s={11}/>Unsave
                        </button>
                      </div>
                    </div>
                  ))}
                </div>}
            </SubPage>
          )}
          {profilePage==="reportHistory"&&(
            <SubPage title="Report History" icon={<Flag c={T.maroon} s={18}/>}>
              {reportedIds.length===0?<Empty icon={<Flag c={T.textDim} s={40}/>} msg="Nothing reported yet."/>:
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <p style={{fontSize:12,color:T.textSub,marginBottom:6,lineHeight:1.5}}>Items you reported are under moderation review.</p>
                  {reportedIds.map(id=>{
                    const post=confs.find(c=>String(c.id)===id)||listings.find(l=>String(l.id)===id);
                    return(
                      <div key={id} style={{background:T.card,border:"1px solid #fde68a",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                        <span style={{background:"#fef9c3",border:"1px solid #fde68a",borderRadius:999,padding:"3px 8px",fontSize:11,fontWeight:700,color:"#92400e",flexShrink:0}}>Reported</span>
                        <p style={{fontSize:13,color:T.textMain,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{post?(post.text||post.title):`ID: ${id}`}</p>
                      </div>
                    );
                  })}
                </div>}
            </SubPage>
          )}
        </>}
      </main>

      {/* ── BOTTOM NAV (4 tabs now) ── */}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:30,backgroundColor:T.maroon,borderTop:"1px solid rgba(255,255,255,0.15)",boxShadow:"0 -4px 20px rgba(128,0,0,0.25)"}}>
        <div style={{display:"flex"}}>
          {[
            {id:"feed",    icon:<Rss s={20}/>,     lbl:"Feed",       act:()=>{setNav("feed");setTab("confessions");setProfilePage(null);}},
            {id:"market",  icon:<Bag s={20}/>,     lbl:"Market",     act:()=>{setNav("feed");setTab("marketplace");setProfilePage(null);}},
            {id:"messages",icon:<ChatNav s={20}/>, lbl:"Messages",   act:()=>{setNav("messages");setProfilePage(null);fetchConvos();fetchPendingReqs();}, badge:totalUnread},
            {id:"profile", icon:<User s={20}/>,    lbl:"Profile",    act:()=>{setNav("profile");setProfilePage(null);}},
          ].map(n=>{
            const a=n.id==="profile"?nav==="profile":n.id==="messages"?nav==="messages":n.id==="market"?(nav==="feed"&&tab==="marketplace"):(nav==="feed"&&tab==="confessions");
            return(
              <button key={n.id} onClick={n.act} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 8px",gap:2,border:"none",background:a?"rgba(255,255,255,0.12)":"transparent",cursor:"pointer",color:a?"white":"rgba(255,255,255,0.6)",transition:"all 0.2s",position:"relative"}}>
                <span style={{transform:a?"scale(1.15)":"scale(1)",transition:"transform 0.2s",display:"flex"}}>{n.icon}</span>
                <span style={{fontSize:9,fontWeight:900,letterSpacing:"0.04em"}}>{n.lbl}</span>
                {a&&<div style={{width:22,height:2,borderRadius:2,background:"rgba(255,255,255,0.9)"}}/>}
                {n.badge>0&&<div style={{position:"absolute",top:6,right:"calc(50% - 14px)",width:17,height:17,borderRadius:"50%",background:"#ef4444",border:"2px solid #800000",color:"white",fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{n.badge}</div>}
              </button>
            );
          })}
        </div>
      </nav>

      {/* ── FAB ── */}
      {nav!=="profile"&&nav!=="messages"&&<button onClick={()=>tab==="marketplace"?setSellModal(true):setConfModal(true)}
        style={{position:"fixed",bottom:80,right:16,zIndex:40,width:56,height:56,borderRadius:"50%",background:T.maroon,border:"none",color:"white",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",boxShadow:"0 6px 24px rgba(128,0,0,0.45)",transition:"transform 0.2s"}}
        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
        onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
        <Plus c="white"/>
      </button>}

      {/* ── CONFESSION MODAL ── */}
      {confModal&&(
        <ModalShell onClose={()=>setConfModal(false)}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:T.maroon,display:"flex",alignItems:"center",justifyContent:"center"}}><Ghost c="white"/></div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:T.textMain}}>Anonymous Confession</h3>
          </div>
          <textarea value={draft} onChange={e=>setDraft(e.target.value)} placeholder="What's on your mind? It stays anonymous…" rows={4} autoFocus dir="ltr"
            style={{width:"100%",background:"#fdf5f5",border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 16px",fontSize:14,color:T.textMain,outline:"none",resize:"none",direction:"ltr",textTransform:"none"}}
            onFocus={e=>e.target.style.borderColor=T.maroon} onBlur={e=>e.target.style.borderColor=T.border}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:16}}>
            <span style={{fontSize:12,color:T.textDim,display:"flex",alignItems:"center",gap:6}}><Ghost c={T.textDim}/>100% anonymous</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfModal(false)} style={{padding:"8px 16px",borderRadius:999,border:`1px solid ${T.border}`,background:"transparent",color:T.textSub,fontSize:13,fontWeight:700,cursor:"pointer"}}>Cancel</button>
              <button onClick={postConf} disabled={!draft.trim()} style={{padding:"8px 20px",borderRadius:999,background:draft.trim()?T.maroon:"#e8c0c0",border:"none",color:draft.trim()?"white":"#b06060",fontSize:13,fontWeight:900,cursor:draft.trim()?"pointer":"default",boxShadow:draft.trim()?"0 4px 14px rgba(128,0,0,0.35)":"none"}}>Post</button>
            </div>
          </div>
        </ModalShell>
      )}

      {/* ── SELL MODAL ── */}
      {sellModal&&(
        <ModalShell onClose={()=>setSellModal(false)} tall>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:T.maroon,display:"flex",alignItems:"center",justifyContent:"center"}}><Bag c="white" s={14}/></div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:T.textMain}}>List Something for Sale</h3>
          </div>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:"0.08em",marginBottom:6}}>ITEM TITLE *</label>
          <input value={sell.title} onChange={e=>setSell(s=>({...s,title:e.target.value}))} placeholder="e.g. Engineering Mathematics Vol 1"
            style={{width:"100%",background:"#fdf5f5",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.textMain,outline:"none",marginBottom:14}}
            onFocus={e=>e.target.style.borderColor=T.maroon} onBlur={e=>e.target.style.borderColor=T.border}/>
          <div style={{display:"flex",gap:12,marginBottom:14}}>
            <div style={{flex:1}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:"0.08em",marginBottom:6}}>PRICE (₹) *</label>
              <input value={sell.price} onChange={e=>setSell(s=>({...s,price:e.target.value.replace(/\D/g,"")}))} placeholder="e.g. 200" type="text" inputMode="numeric"
                style={{width:"100%",background:"#fdf5f5",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.textMain,outline:"none"}}
                onFocus={e=>e.target.style.borderColor=T.maroon} onBlur={e=>e.target.style.borderColor=T.border}/>
            </div>
            <div style={{flex:1}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:"0.08em",marginBottom:6}}>CATEGORY</label>
              <select value={sell.category} onChange={e=>setSell(s=>({...s,category:e.target.value}))}
                style={{width:"100%",background:"#fdf5f5",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.textMain,outline:"none",cursor:"pointer"}}>
                <option value="book">📚 Book</option><option value="cycle">🚲 Cycle</option><option value="other">📦 Other</option>
              </select>
            </div>
          </div>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:"0.08em",marginBottom:8}}>CONDITION</label>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["Like New","Good","Fair"].map(c=>(
              <button key={c} onClick={()=>setSell(s=>({...s,condition:c}))} style={{flex:1,padding:"8px 0",borderRadius:10,fontSize:12,fontWeight:700,border:`1px solid ${sell.condition===c?T.maroon:T.border}`,background:sell.condition===c?T.maroon:"transparent",color:sell.condition===c?"white":T.textSub,cursor:"pointer",transition:"all 0.2s"}}>{c}</button>
            ))}
          </div>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:"0.08em",marginBottom:6}}>DESCRIPTION *</label>
          <textarea value={sell.desc} onChange={e=>setSell(s=>({...s,desc:e.target.value}))} placeholder="Describe your item…" rows={3} dir="ltr"
            style={{width:"100%",background:"#fdf5f5",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:T.textMain,outline:"none",resize:"none",marginBottom:16,direction:"ltr",textTransform:"none"}}
            onFocus={e=>e.target.style.borderColor=T.maroon} onBlur={e=>e.target.style.borderColor=T.border}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setSellModal(false)} style={{padding:"10px 20px",borderRadius:999,border:`1px solid ${T.border}`,background:"transparent",color:T.textSub,fontSize:13,fontWeight:700,cursor:"pointer"}}>Cancel</button>
            <button onClick={postSell} disabled={!sell.title.trim()||!sell.price||!sell.desc.trim()}
              style={{padding:"10px 24px",borderRadius:999,border:"none",fontSize:13,fontWeight:900,cursor:sell.title.trim()&&sell.price&&sell.desc.trim()?"pointer":"default",background:sell.title.trim()&&sell.price&&sell.desc.trim()?T.maroon:"#e8c0c0",color:sell.title.trim()&&sell.price&&sell.desc.trim()?"white":"#b06060",boxShadow:sell.title.trim()&&sell.price&&sell.desc.trim()?"0 4px 14px rgba(128,0,0,0.35)":"none"}}>List Item</button>
          </div>
        </ModalShell>
      )}

      {/* ── SIGN OUT CONFIRM ── */}
      {commentsPost&&(<ModalShell onClose={()=>setCommentsPost(null)} tall><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><div style={{width:28,height:28,borderRadius:"50%",background:T.maroon,display:"flex",alignItems:"center",justifyContent:"center"}}><MsgIco c="white" s={14}/></div><h3 style={{fontSize:16,fontWeight:900,color:T.textMain}}>Comments</h3><span style={{marginLeft:"auto",fontSize:12,color:T.textDim}}>{commentsPost.comments||0} comments</span></div><p style={{fontSize:13,color:T.textSub,fontStyle:"italic",background:T.subtle,borderRadius:10,padding:"10px 14px",marginBottom:16}}>{commentsPost.text.slice(0,90)}</p><div style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>{(commentsPost.commentsList||[{id:1,user:"anon_ghost",text:"This is literally me every semester",time:"2h ago"},{id:2,user:"campus_soul",text:"I felt this in my bones",time:"3h ago"}]).map(cm=>(<div key={cm.id} style={{background:T.subtle,borderRadius:12,padding:"10px 14px",border:"1px solid #e8c0c0"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,fontWeight:700,color:T.maroon}}>👻 {cm.user}</span><span style={{fontSize:11,color:T.textDim}}>{cm.time}</span></div><p style={{fontSize:13,color:T.textMain}}>{cm.text}</p></div>))}</div><div style={{display:"flex",gap:8,alignItems:"flex-end",borderTop:"1px solid #e8c0c0",paddingTop:12}}><textarea value={commentDraft} onChange={e=>setCommentDraft(e.target.value)} placeholder="Comment anonymously..." rows={2} dir="ltr" style={{flex:1,background:"#fdf5f5",border:"1px solid #e8c0c0",borderRadius:12,padding:"10px 14px",fontSize:13,color:"#1a0000",outline:"none",resize:"none",direction:"ltr"}} onFocus={e=>e.target.style.borderColor="#800000"} onBlur={e=>e.target.style.borderColor="#e8c0c0"}/><button onClick={()=>{if(!commentDraft.trim())return;(async()=>{const{data,error}=await sb.from("comments").insert({post_id:commentsPost.id,user_id:user?.id,text:commentDraft.trim()}).select().single();if(!error){const nc={id:data.id,user:userEmail.split("@")[0],text:commentDraft.trim(),time:"just now"};setConfs(cs=>cs.map(c=>c.id===commentsPost.id?{...c,comments:(c.comments||0)+1,commentsList:[...(c.commentsList||[]),nc]}:c));setCommentsPost(cp=>({...cp,comments:(cp.comments||0)+1,commentsList:[...(cp.commentsList||[]),nc]}));setCommentDraft("");showToast("Comment posted 👻");}else showToast("Failed.","#ef4444");})();}} style={{width:42,height:42,borderRadius:"50%",background:commentDraft.trim()?"#800000":"#e8c0c0",border:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width={16} height={16} fill="white" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z" fill="none" stroke="white" strokeWidth="2"/></svg></button></div></ModalShell>)}

      {signOutDlg&&(
        <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{position:"absolute",inset:0,background:"rgba(26,0,0,0.5)",backdropFilter:"blur(4px)"}} onClick={()=>setSignOutDlg(false)}/>
          <div className="fade-up" style={{position:"relative",width:"100%",maxWidth:320,background:T.card,border:`1px solid ${T.border}`,borderRadius:20,padding:24,boxShadow:"0 8px 40px rgba(128,0,0,0.2)",textAlign:"center"}}>
            <div style={{width:48,height:48,borderRadius:"50%",background:"#fdf0f0",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><LogOut c={T.maroon} s={22}/></div>
            <h3 style={{fontSize:16,fontWeight:900,color:T.textMain,marginBottom:8,fontFamily:"'Playfair Display',serif"}}>Sign out?</h3>
            <p style={{fontSize:13,color:T.textSub,marginBottom:20,lineHeight:1.5}}>You'll need your magic link to get back in.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setSignOutDlg(false)} style={{flex:1,padding:"11px",borderRadius:12,border:`1px solid ${T.border}`,background:"transparent",color:T.textSub,fontSize:13,fontWeight:700,cursor:"pointer"}}>Stay in</button>
              <button onClick={onSignOut} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:T.maroon,color:"white",fontSize:13,fontWeight:900,cursor:"pointer",boxShadow:"0 3px 12px rgba(128,0,0,0.35)"}}>Sign out</button>
            </div>
          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast&&(
        <div className="fade-up" style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",zIndex:99,display:"flex",alignItems:"center",gap:10,padding:"12px 20px",borderRadius:16,background:"#1a0000",color:"white",fontSize:13,fontWeight:700,boxShadow:"0 8px 24px rgba(0,0,0,0.25)",maxWidth:"85vw",textAlign:"center",wordBreak:"break-word",whiteSpace:"normal"}}>
          <Check c={toast.color||"#4ade80"} s={15}/>{toast.msg}
        </div>
      )}
    </div>
  );
}

/* ══════════ ROOT ══════════ */
function Root(){
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setSession(session);setLoading(false);});
    return()=>subscription.unsubscribe();
  },[]);
  const signOut=async()=>{await sb.auth.signOut();setSession(null);};
  const handleDemoLogin=email=>setSession({user:{email,id:"demo-"+Date.now()}});
  if(loading) return(
    <div style={{minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:T.page}}>
      <div style={{textAlign:"center"}}><Spinner s={36} c={T.maroon}/><p style={{marginTop:14,fontSize:13,color:T.textDim,fontWeight:600}}>Loading The Quad…</p></div>
    </div>
  );
  if(!session) return <AuthScreen onDemoLogin={handleDemoLogin}/>;
  return <MainApp user={session.user} onSignOut={signOut}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
