*{box-sizing:border-box;margin:0;padding:0}
body{background:#fdf5f5;font-family:'Lato',sans-serif;min-height:100vh}
button{cursor:pointer;font-family:'Lato',sans-serif}
textarea,input,select{font-family:'Lato',sans-serif;direction:ltr;text-transform:none;unicode-bidi:plaintext}
textarea::placeholder,input::placeholder{color:#b06060}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#fdf5f5}
::-webkit-scrollbar-thumb{background:#c88080;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.fade-up{animation:fadeUp 0.32s ease both}
.slide-up{animation:slideUp 0.28s cubic-bezier(.22,1,.36,1) both}
.slide-in{animation:slideIn 0.28s cubic-bezier(.22,1,.36,1) both}
.pop-in{animation:popIn 0.2s ease both}
.pulse{animation:pulse 2s infinite}
.spin{animation:spin 0.8s linear infinite}
.float{animation:float 3s ease-in-out infinite}
.card{background:#fff;border:1px solid #e8c0c0;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(128,0,0,0.07);transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:#c88080;box-shadow:0 4px 20px rgba(128,0,0,0.12)}
/* Chat bubbles */
.bubble-me{background:#800000;color:white;border-radius:18px 18px 4px 18px;padding:10px 14px;max-width:75%;font-size:14px;line-height:1.5;box-shadow:0 2px 8px rgba(128,0,0,0.25)}
.bubble-them{background:#fff;color:#1a0000;border:1px solid #e8c0c0;border-radius:18px 18px 18px 4px;padding:10px 14px;max-width:75%;font-size:14px;line-height:1.5;box-shadow:0 1px 4px rgba(128,0,0,0.08)}
.bubble-system{background:#fdf0f0;color:#6b2020;border-radius:12px;padding:8px 14px;font-size:12px;text-align:center;border:1px solid #e8c0c0;max-width:85%}
  /* Prevent background scroll when sheet open */
  body.sheet-open { overflow: hidden; touch-action: none; }
  /* Mobile keyboard fix */
  .chat-wrap {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    height: -webkit-fill-available;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    overflow: hidden;
  }
  .chat-header { flex-shrink: 0; z-index: 2; }
  .chat-banner { flex-shrink: 0; }
  .chat-messages {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .chat-input { flex-shrink: 0; }
  /* Instagram-style bottom sheet */
  .bottom-sheet-overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .bottom-sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(26,0,0,0.45);
    backdrop-filter: blur(4px);
  }
  .bottom-sheet {
    position: relative;
    width: 100%; max-width: 430px;
    background: #fff;
    border: 1px solid #e8c0c0;
    border-bottom: none;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -8px 40px rgba(128,0,0,0.15);
    display: flex; flex-direction: column;
    transition: height 0.3s cubic-bezier(0.32,0.72,0,1);
    touch-action: none;
    will-change: transform, height;
  }
  .bottom-sheet-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: #e8c0c0; margin: 12px auto 0;
    cursor: grab; flex-shrink: 0;
  }
  .bottom-sheet-content {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 24px 24px;
  }
</style>
